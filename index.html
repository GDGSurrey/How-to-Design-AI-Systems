<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDG Surrey | Interactive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');

        :root {
            --blue: #4285F4; --red: #EA4335; --yellow: #FBBC04; --green: #34A853;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: 'Google Sans', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #050505; color: white; overflow: hidden;
        }

        /* The Glow Effect */
        .glow-bg {
            position: fixed; width: 100vw; height: 100vh; z-index: -1;
            filter: blur(80px); opacity: 0.5;
        }
        .orb { position: absolute; border-radius: 50%; }
        .orb-1 { width: 400px; height: 400px; background: var(--blue); top: -10%; left: -10%; }
        .orb-2 { width: 350px; height: 350px; background: var(--green); bottom: -5%; right: -5%; }
        .orb-3 { width: 300px; height: 300px; background: var(--red); top: 40%; right: 10%; opacity: 0.3; }

        #app-container { width: 100%; max-width: 480px; padding: 25px; z-index: 10; }

        .header h1 {
            font-size: 1.8rem; margin: 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .progress-container { margin: 20px 0 30px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #progress-fill { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, var(--blue), var(--green));
            transition: width 0.5s ease;
        }

        .card-container { perspective: 1200px; height: 380px; margin-bottom: 30px; }
        .card {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 32px;
            padding: 45px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .card-back { transform: rotateY(180deg); border-color: rgba(52, 168, 83, 0.3); }

        .label { 
            font-size: 0.7rem; letter-spacing: 3px; font-weight: 700; 
            margin-bottom: 25px; text-transform: uppercase;
        }
        .q-label { color: var(--blue); }
        .a-label { color: var(--green); }

        .text-content { font-size: 1.4rem; line-height: 1.5; font-weight: 400; color: #eee; }

        .controls { display: flex; justify-content: space-between; align-items: center; }
        button {
            padding: 16px 32px; border-radius: 20px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; font-family: inherit;
        }
        .btn-prev { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .btn-next { 
            background: white; color: black; border: none;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #congrats { display: none; text-align: center; }
        .finish-btn {
            display: inline-block; padding: 20px 45px; margin-top: 25px;
            background: linear-gradient(90deg, var(--blue), var(--green));
            color: white; text-decoration: none; border-radius: 50px; font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="glow-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div id="app-container">
        <div id="game-view">
            <div class="header">
                <h1>GDG Surrey</h1>
                <div class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:8px; color:#aaa;">
                        <span>Day 1: AI Systems</span>
                        <span><span id="current-num">0</span> / <span id="total-num">0</span></span>
                    </div>
                    <div class="progress-bar"><div id="progress-fill"></div></div>
                </div>
            </div>
            
            <div class="card-container" onclick="flipCard()">
                <div class="card" id="card-inner">
                    <div class="card-face">
                        <div class="label q-label">Question</div>
                        <div class="text-content" id="front-text"></div>
                    </div>
                    <div class="card-face card-back">
                        <div class="label a-label">Answer</div>
                        <div class="text-content" id="back-text"></div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-prev" id="prev-btn" onclick="prevCard()" disabled>Back</button>
                <button class="btn-next" id="next-btn" onclick="nextCard()">Next</button>
            </div>
        </div>

        <div id="congrats">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">🎉</h1>
            <h2 style="font-size: 2rem;">Event Complete!</h2>
            <p style="color: #aaa; margin-bottom: 30px;">You've mastered all the Day 1 Agentic Architecture concepts.</p>
            <a href="https://gdg.community.dev/gdg-surrey/" class="finish-btn" target="_blank">Connect with GDG Surrey</a>
        </div>
    </div>

<script>
    let flashcards = [];
    let currentIndex = 0;

    function initApp() {
        Papa.parse("flashcards.csv", {
            download: true,
            header: true,
            complete: function(results) {
                flashcards = results.data
                    .filter(row => row.Question && row.Answer)
                    .map(row => ({
                        // Regex removes the tags found in your CSV
                        q: row.Question.replace(/\\s*/gi, "").trim(),
                        a: row.Answer.trim()
                    }));

                if (flashcards.length > 0) {
                    document.getElementById('total-num').innerText = flashcards.length;
                    updateCard();
                }
            }
        });
    }

    function updateCard() {
        const cardInner = document.getElementById('card-inner');
        cardInner.classList.remove('is-flipped');
        
        setTimeout(() => {
            document.getElementById('front-text').innerText = flashcards[currentIndex].q;
            document.getElementById('back-text').innerText = flashcards[currentIndex].a;
            document.getElementById('current-num').innerText = currentIndex + 1;
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) / flashcards.length * 100) + "%";
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').innerText = currentIndex === flashcards.length - 1 ? "Finish" : "Next";
        }, 150);
    }

    function flipCard() { document.getElementById('card-inner').classList.toggle('is-flipped'); }

    function nextCard() {
        if (currentIndex < flashcards.length - 1) {
            currentIndex++;
            updateCard();
        } else {
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('congrats').style.display = 'block';
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    window.onload = initApp;
</script>
</body>
</html>
