<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDG Surrey | AI Interactive</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J60DPDDWYC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-J60DPDDWYC');
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        :root {
            --blue: #4285F4; --red: #EA4335; --yellow: #FBBC04; --green: #34A853;
            --glass: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Google Sans', sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #020202; color: white; overflow-x: hidden;
        }
        .glow-bg {
            position: fixed; width: 100vw; height: 100vh; z-index: -1;
            filter: blur(100px); opacity: 0.6;
        }
        .orb { position: absolute; border-radius: 50%; opacity: 0.5; }
        .orb-1 { width: 500px; height: 500px; background: var(--blue); top: -15%; left: -10%; }
        .orb-2 { width: 450px; height: 450px; background: var(--green); bottom: -10%; right: -10%; }
        .orb-3 { width: 300px; height: 300px; background: var(--red); top: 30%; right: 15%; opacity: 0.2; }

        #app-container { width: 100%; max-width: 500px; padding: 25px; z-index: 10; box-sizing: border-box; }

        .tabs {
            display: flex; background: rgba(255, 255, 255, 0.05);
            padding: 5px; border-radius: 50px; margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            border-radius: 40px; font-weight: 500; font-size: 0.9rem;
            transition: all 0.3s ease; color: #777;
        }
        .tab.active { background: rgba(255, 255, 255, 0.1); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .header h1 {
            font-size: 1.6rem; margin: 0; font-weight: 700;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .progress-container { margin: 15px 0 25px; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #progress-fill { 
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--green));
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-container { perspective: 1200px; height: 400px; margin-bottom: 25px; }
        .card {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 32px;
            padding: 40px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-start;
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .card-back { transform: rotateY(180deg); border-color: rgba(52, 168, 83, 0.2); }
        .label { font-size: 0.75rem; letter-spacing: 2px; font-weight: 700; margin-bottom: 25px; text-transform: uppercase; }
        .q-label { color: var(--blue); } .a-label { color: var(--green); }
        .text-content { font-size: 1.3rem; line-height: 1.5; font-weight: 400; color: #ffffff; }

        .controls { display: flex; justify-content: space-between; align-items: center; }
        button {
            padding: 16px 35px; border-radius: 50px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 0.95rem;
        }
        .btn-prev { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        .btn-next { background: white; color: black; border: none; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #congrats { display: none; text-align: center; }
        .finish-btn {
            display: inline-block; padding: 18px 45px; margin-top: 25px;
            background: linear-gradient(90deg, var(--blue), var(--green));
            color: white; text-decoration: none; border-radius: 50px; font-weight: 700;
        }
        .disclaimer {
            margin-top: 40px; font-size: 0.75rem; color: rgba(255,255,255,0.3);
            text-align: center; line-height: 1.6; padding: 0 20px;
        }
        .disclaimer strong { color: rgba(255,255,255,0.6); }
        .disclaimer a { color: var(--blue); text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="glow-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

    <div id="app-container">
        <div class="tabs">
            <div id="tab1" class="tab active" onclick="switchTab(1)">Day 1</div>
            <div id="tab2" class="tab" onclick="switchTab(2)">Day 2</div>
        </div>

        <div id="main-view">
            <div id="game-view">
                <div class="header">
                    <h1 id="day-title">AI System Design</h1>
                    <div class="progress-container">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:8px; color:#777;">
                            <span id="topic-label">AGENTIC ARCHITECTURE</span>
                            <span><span id="current-num">0</span> / <span id="total-num">0</span></span>
                        </div>
                        <div class="progress-bar"><div id="progress-fill"></div></div>
                    </div>
                </div>
                
                <div class="card-container" onclick="flipCard()">
                    <div class="card" id="card-inner">
                        <div class="card-face">
                            <div class="label q-label">Question</div>
                            <div class="text-content" id="front-text">Loading...</div>
                        </div>
                        <div class="card-face card-back">
                            <div class="label a-label">Answer</div>
                            <div class="text-content" id="back-text"></div>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn-prev" id="prev-btn" onclick="prevCard()" disabled>Back</button>
                    <button class="btn-next" id="next-btn" onclick="nextCard()">Next</button>
                </div>
            </div>

            <div id="congrats">
                <h1 id="congrats-title" style="font-size: 2.2rem; margin-bottom: 10px;">Day 1 Complete!</h1>
                <p style="color: #aaa; margin-bottom: 30px;">Great job. Ready for the next session?</p>
                <a href="https://gdg.community.dev/gdg-surrey/" class="finish-btn" target="_blank">GDG Surrey Hub</a>
            </div>
        </div>

        <div class="disclaimer">
            This interactive is based on the session:<br>
            <strong>Day 2: Production-Ready AI & Agentic Design</strong><br>
            Presented by <a href="https://gdg.community.dev/gdg-surrey/" target="_blank">GDG Surrey</a>
        </div>
    </div>

<script>
    let flashcardData = { 1: [], 2: [] };
    let currentDay = 1;
    let currentIndex = 0;

    const config = {
        1: { file: "flashcards.csv", title: "AI System Design", topic: "AGENTIC ARCHITECTURE" },
        2: { file: "Day_2_Flashcards - Sheet1.csv", title: "Production AI", topic: "EVALUATION & INTERPRETABILITY" }
    };

    function switchTab(day) {
        currentDay = day;
        currentIndex = 0;
        
        document.getElementById('tab1').classList.toggle('active', day === 1);
        document.getElementById('tab2').classList.toggle('active', day === 2);
        document.getElementById('game-view').style.display = 'block';
        document.getElementById('congrats').style.display = 'none';
        document.getElementById('day-title').innerText = config[day].title;
        document.getElementById('topic-label').innerText = config[day].topic;
        
        if (flashcardData[day].length === 0) {
            loadData(day);
        } else {
            updateCard();
        }
        
        if (typeof gtag === 'function') {
            gtag('event', 'tab_switch', { 'day_selected': day });
        }
    }

    function loadData(day) {
        Papa.parse(config[day].file, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                flashcardData[day] = results.data
                    .filter(row => row.Question && row.Answer)
                    .map(row => ({
                        q: row.Question.replace(/\\s*/gi, "").trim(),
                        a: row.Answer.trim()
                    }));

                if (flashcardData[day].length > 0) {
                    updateCard();
                }
            }
        });
    }

    function updateCard() {
        const cards = flashcardData[currentDay];
        const cardInner = document.getElementById('card-inner');
        cardInner.classList.remove('is-flipped');
        
        setTimeout(() => {
            document.getElementById('front-text').innerText = cards[currentIndex].q;
            document.getElementById('back-text').innerText = cards[currentIndex].a;
            document.getElementById('current-num').innerText = currentIndex + 1;
            document.getElementById('total-num').innerText = cards.length;
            document.getElementById('progress-fill').style.width = ((currentIndex + 1) / cards.length * 100) + "%";
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').innerText = currentIndex === cards.length - 1 ? "Finish" : "Next";
        }, 150);
    }

    function flipCard() { document.getElementById('card-inner').classList.toggle('is-flipped'); }

    function nextCard() {
        const cards = flashcardData[currentDay];
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCard();
        } else {
            if (typeof gtag === 'function') { gtag('event', 'completion_day' + currentDay); }
            document.getElementById('congrats-title').innerText = "Day " + currentDay + " Complete!";
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('congrats').style.display = 'block';
        }
    }

    function prevCard() {
        if (currentIndex > 0) { currentIndex--; updateCard(); }
    }

    window.onload = () => switchTab(1);
</script>
</body>
</html>
